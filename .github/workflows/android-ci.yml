name: Android Build & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Pinned to a version known-compatible with AGP 8.4.0, instead of
      # whatever Gradle happens to be preinstalled on the runner. This is
      # what avoids the "Gradle 9.6.1 ... incompatible with Gradle 10"
      # drift warnings we hit before.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Run lint
        run: gradle lint

      - name: Run unit tests
        run: gradle testDebugUnitTest

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: barndoor-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # Everything below only runs when the trigger was a version tag push
      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: gradle assembleRelease

      - name: Rename release APK with version tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: cp app/build/outputs/apk/release/app-release.apk barndoor-${{ github.ref_name }}.apk

      - name: Publish GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: barndoor-${{ github.ref_name }}.apk
          generate_release_notes: true
