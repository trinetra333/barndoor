name: Build Barndoor APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK (installable, signed with debug key)
        env:
          MULLVAD_ACCOUNT: ${{ secrets.MULLVAD_ACCOUNT }}
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Build release APK (unsigned)
        env:
          MULLVAD_ACCOUNT: ${{ secrets.MULLVAD_ACCOUNT }}
        run: gradle assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: barndoor-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: barndoor-release-apk-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore
